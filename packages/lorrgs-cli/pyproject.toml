[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "lorrgs-cli"
version = "0.5.0"
description = "Agent-first CLI for Lorrgs cooldown timeline and composition ranking data"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.1,<1.0.0",
  "typer>=0.12.5,<1.0.0",
  "warcraft-api-cli>=0.1.0",
  "warcraft-core-cli>=0.1.0",
]

[project.scripts]
lorrgs = "lorrgs_cli.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/lorrgs_cli"]
