[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "curseforge-cli"
version = "0.3.0"
description = "Agent-first CLI for the public CurseForge addon API (World of Warcraft)"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.1,<1.0.0",
  "typer>=0.12.5,<1.0.0",
  "warcraft-api-cli>=0.1.0",
  "warcraft-core-cli>=0.1.0",
]

[project.scripts]
curseforge = "curseforge_cli.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/curseforge_cli"]
