name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Ruff (shared packages)
        run: make lint

      - name: Mypy (shared packages)
        run: make typecheck

      - name: Import boundaries
        run: make lint-boundaries
