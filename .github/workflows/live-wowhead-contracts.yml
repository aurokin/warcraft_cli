name: Live Wowhead Contracts

on:
  workflow_dispatch:

jobs:
  schema-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Wowhead schema snapshots (recorded fixtures)
        run: .venv/bin/pytest -q tests/test_wowhead_schema_snapshots.py tests/test_wowhead_doctor.py

  live-expansion:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        expansion:
          - retail
          - classic
          - wotlk
          - cata
          - mop-classic
          - ptr
          - tbc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Live endpoint + integration contracts
        env:
          WOWHEAD_LIVE_TESTS: "1"
        run: |
          .venv/bin/pytest -q \
            tests/test_live_endpoint_contracts.py -k "${{ matrix.expansion }}" \
            tests/test_live_integration.py -k "${{ matrix.expansion }}"

  live-parser-canaries:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Parser canaries
        env:
          WOWHEAD_LIVE_TESTS: "1"
        run: .venv/bin/pytest -q tests/test_wowhead_parser_canaries.py
